name: prisma

services:

  webserver:
    image: nginx:1.27-alpine
    container_name: prisma_webserver
    restart: unless-stopped
    ports:
      - "8032:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - .:/var/www/html
    depends_on:
      - app
    networks:
      - prisma_net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: prisma_app
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8032}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-prisma}
      DB_USERNAME: ${DB_USERNAME:-prisma}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: sync
    networks:
      - prisma_net

  mysql:
    image: mysql:8.4
    container_name: prisma_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-prisma}
      MYSQL_USER: ${DB_USERNAME:-prisma}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - prisma_net

volumes:
  mysql_data:

networks:
  prisma_net:
    driver: bridge
