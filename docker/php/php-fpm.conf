; =============================================================================
;  PRISMA — PHP-FPM pool configuration
;  Dynamic process manager | Alta concorrência
; =============================================================================

[www]
user  = www-data
group = www-data

listen = 0.0.0.0:9000
listen.owner = www-data
listen.group = www-data
listen.mode  = 0660

; Process manager: dynamic for best performance under variable load
pm                   = dynamic
pm.max_children      = 50
pm.start_servers     = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests      = 500

; Logging
access.log           = /proc/self/fd/2
slowlog              = /proc/self/fd/2
request_slowlog_timeout = 5s

; Clear environment so .env is used
clear_env = no

; Status / ping endpoints (useful for healthchecks)
pm.status_path = /fpm-status
ping.path      = /fpm-ping
